  - id: WBG-001
    severity: high
    category: a11y
    source: wppqa
    title: "Conversions form: number inputs share label with select (PointTypeConversionsPage)"
    where:
      - file: src/Admin/PointTypeConversionsPage.php
        line: 247
      - file: src/Admin/PointTypeConversionsPage.php
        line: 259
    detail: |
      Each conversion row has two inputs: a `<input type="number">` for the
      amount and a `<select>` for the currency. Both sit under one shared
      `<label for="wb-gam-conv-from">` (and `for="wb-gam-conv-to"`), so screen
      readers announce both fields with the same name and users can't tell
      which is which. WCAG 3.3.2 fail.
    suggested_fix: |
      Split the labels: `<label for="wb-gam-conv-from-amount">Amount</label>`
      and `<label for="wb-gam-conv-from">Currency</label>` (same for the
      `to_amount` / `to_type` pair on line 259). Visually you can use
      `screen-reader-text` for the new sub-labels if the cell-level "From" /
      "To" heading is enough sighted context.
    journey_owns_this:
      - audit/journeys/release/07-a11y-and-mobile.md
    blocked_by: []
    refs:
      - manifest_path: "static_analysis.wppqa_audit_plugin_findings (a11y, BUG-3075)"

  - id: WBG-002
    severity: high
    category: a11y
    source: wppqa
    title: "Submissions queue: thumbnail focus-ring removed without keyboard replacement"
    where:
      - file: assets/css/admin/pages/submissions.css
        line: 78
      - file: assets/css/admin/pages/submissions-rtl.css
        line: 79
    detail: |
      `.wb-gam-submission-thumb:focus-visible` sets `outline: none` and only
      adds `transform: scale(1.06)` + a border-color change. Border-color
      alone is not a sufficient WCAG 2.4.7 focus indicator on a 56×56 image
      thumb — keyboard users tabbing through the queue can lose track of
      position, especially in dark mode. The :hover state shares the same
      rule, so the keyboard focus is indistinguishable from a passing mouse.
    suggested_fix: |
      Add a dedicated `:focus-visible` outline that uses the brand token,
      separate from `:hover`. Pattern:

          .wb-gam-submission-thumb:hover { transform: scale(1.06); border-color: var(--wbgam-primary); }
          .wb-gam-submission-thumb:focus-visible {
              outline: 2px solid var(--wbgam-primary);
              outline-offset: 2px;
              transform: scale(1.06);
          }

      Then re-min via the build pipeline so the `.min.css` siblings inherit
      the fix (the wppqa scanner flags both — that's automatic once the
      source is fixed).
    journey_owns_this:
      - audit/journeys/release/07-a11y-and-mobile.md
    blocked_by: []
    refs:
      - manifest_path: "static_analysis.wppqa_audit_plugin_findings (a11y, BUG-3082..3085)"

  - id: WBG-003
    severity: high
    category: a11y
    source: wppqa
    title: "Click handlers without keyboard alternatives in 5 JS files"
    where:
      - file: assets/js/admin-submissions.js
        line: 54
      - file: assets/js/admin-test-event.js
        line: 42
      - file: assets/js/hub-convert.js
        line: 112
      - file: src/Blocks/badge-showcase/view.js
        line: 27
      - file: src/Blocks/user-status-bar/view.js
        line: 34
    detail: |
      Each site registers a `click` handler whose target isn't obviously a
      `<button>` / `<a>` / `<input>`. If any of these handlers fire on a
      `<div>` / `<span>` / list item, keyboard-only users can't activate it.
      The wppqa scanner can't statically resolve the target — half are likely
      already on real buttons, but the remaining ones are real keyboard
      accessibility bugs (Rule 4 from `bin/coding-rules-check.sh` requires
      Enter/Space parity on every interactive non-button).
    suggested_fix: |
      For each site, either (a) confirm the target IS a `<button>` /
      `role="button"` element and add a code comment so the scanner stops
      flagging it, or (b) add a `keydown` handler that calls the same
      function on `Enter` / `Space` and includes `event.preventDefault()`
      for the space key. The hub-convert.js modal-close click should
      definitely have an ESC handler too (the scanner already flags it
      separately).
    journey_owns_this:
      - audit/journeys/release/07-a11y-and-mobile.md
    blocked_by: []
    refs:
      - manifest_path: "static_analysis.wppqa_audit_plugin_findings (a11y, BUG-3081)"

