  - id: WBG-013
    severity: low
    category: tech_debt
    source: other
    title: "wppqa audit_plugin omnibus reports 2,399 phpcs failures from misconfigured run"
    where:
      - file: ".phpcs.xml"
        line: 0
    detail: |
      `mcp__wp-plugin-qa__wppqa_audit_plugin` invokes phpcs without the
      project's `.phpcs.xml` config, producing 2,399 "failures" that
      `composer phpcs` (the project gate) doesn't see. This pollutes
      every wppqa baseline with a 2k+ count and obscures the real
      signal. Already mitigated downstream: `bin/wppqa-baseline-check.sh`
      reads SUMMARY.md not the JSON, so the release gate isn't impacted.
      But analysts reading the JSON have to know to skip the phpcs block.
    suggested_fix: |
      Either (a) document the noise in `audit/wppqa-baseline-*/SUMMARY.md`
      every run (already done — see today's SUMMARY.md), or (b) patch the
      wppqa MCP server to honor `.phpcs.xml` if present and re-run. Patch
      is a one-line fix in the MCP server (`exec phpcs --standard=.phpcs.xml`
      instead of bare `exec phpcs`); coordinate with the wp-plugin-qa
      MCP maintainer.
    journey_owns_this: []
    blocked_by: []
    refs:
      - manifest_path: "static_analysis.wppqa_audit_plugin_findings.verdict"

