    suggested_fix: |
      Add `is-dismissible` to the notice class list, OR add an inline
      "Dismiss for now" link that sets a per-user meta key the notice
      checks before rendering. The notice is already scoped to plugin
      pages (line 212), so the noise is contained — but dismissibility
      is still expected.
    journey_owns_this:
