  - id: WBG-005
    severity: medium
    category: correctness
    source: wppqa
    title: "fetch() calls without .catch() in 8 shipped JS files"
    where:
      - file: assets/js/admin-action-overrides.js
        line: 32
      - file: assets/js/admin-rest-utils.js
        line: 86
      - file: assets/js/admin-test-event.js
        line: 49
      - file: assets/js/give-kudos.js
        line: 46
      - file: src/Blocks/redemption-store/view.js
        line: 87
      - file: src/Blocks/submit-achievement/view.js
        line: 67
    detail: |
      Each fetch() call resolves but has no .catch() handler. On a
      network failure (offline / 502 / aborted by ad-blocker) the promise
      silently rejects and the UI freezes — for redemption-store/view.js
      and submit-achievement/view.js this means the buy / submit button
      stays in its "loading" spinner forever. For give-kudos.js it means
      the kudos icon spinner never resets. Real customer-visible hang risk
      on flaky networks, exactly the failure mode `wppqa.rest_hang_risks`
      is designed to surface.
    suggested_fix: |
      Add a .catch() to each chain that (a) toasts a user-visible error
      via `window.wbGamToast` (already loaded on every plugin page) and
      (b) re-enables the disabled button / clears the spinner state. For
      admin-rest-utils.js the central helper already has error handling;
      the 5 standalone files should ideally call `wbGamRestRequest()`
      instead of raw fetch — that would close all 5 in one refactor.
    journey_owns_this:
      - audit/journeys/release/04-earning-journey.md
      - audit/journeys/release/02-editor-15-blocks.md
    blocked_by: []
    refs:
      - manifest_path: "static_analysis.rest_hang_risks (cached at audit/derived/rest-hang-risks.json)"

  - id: WBG-006
    severity: medium
    category: a11y
    source: wppqa
    title: "Modal/popup missing ESC key handler in 3 JS sites"
    where:
      - file: assets/js/hub-convert.js
        line: 5
      - file: src/Blocks/badge-showcase/view.js
        line: 6
      - file: src/Blocks/redemption-store/view.js
        line: 9
    detail: |
      The currency-convert modal (hub-convert.js), badge-showcase detail
      modal, and redemption-store confirmation modal all open via a
      click handler but lack a `keydown` handler for the `Escape` key.
      Keyboard-only users can't dismiss the dialog without tabbing to a
      close button. WCAG 2.1.2 (No Keyboard Trap).
    suggested_fix: |
      For each modal, add a document-level keydown listener while open:

          document.addEventListener('keydown', onKeydown);
          function onKeydown(e) { if (e.key === 'Escape') closeModal(); }

      Remove it when the modal closes. Pair with focus-trap so Tab cycles
      inside the modal and ARIA `aria-modal="true"` + `role="dialog"`
      attributes (the scanner also flags those as missing on the same
      sites — fixing focus + ESC + ARIA in one commit closes 3 findings).
    journey_owns_this:
      - audit/journeys/release/07-a11y-and-mobile.md
    blocked_by: []
    refs:
      - manifest_path: "static_analysis.wppqa_audit_plugin_findings (frontend-eval, modal a11y)"

  - id: WBG-007
    severity: medium
    category: a11y
    source: wppqa
    title: "Modal popup missing ARIA attributes in 3 JS sites"
    where:
      - file: assets/js/hub-convert.js
        line: 5
      - file: src/Blocks/badge-showcase/view.js
        line: 6
      - file: src/Blocks/redemption-store/view.js
        line: 9
    detail: |
      The same three modals as WBG-006 also lack `role="dialog"`,
      `aria-modal="true"`, and an `aria-labelledby` reference to the
      modal title. Screen readers either announce the modal as generic
      page content or fall back on the underlying page text, which is
      confusing once the dialog steals focus.
    suggested_fix: |
      When the modal opens, the JS should set the wrapper's
      `role="dialog"`, `aria-modal="true"`, and
      `aria-labelledby="modal-title-id"` attributes (or render them
      directly in the SSR'd PHP if the modal is static). Pair with the
      ESC + focus-trap fix from WBG-006 so a single PR closes both
      issues per modal.
    journey_owns_this:
      - audit/journeys/release/07-a11y-and-mobile.md
    blocked_by:
      - WBG-006
    refs:
      - manifest_path: "static_analysis.wppqa_audit_plugin_findings (frontend-eval, modal a11y)"

