deferred:
  - id: DEF-001
    title: "phpcs:ignore inline annotations (442 sites)"
    reason: |
      442 inline `phpcs:ignore` / `phpcs:disable` annotations across the
      codebase. Each one is a deliberate suppression with a nearby
      comment explaining why (mostly nonce-verified-upstream, direct-DB
      query for hot ledger paths). The annotations ARE the documentation;
      bulk-removing them would create noise without improving safety.
      Reviewed at PR time on a case-by-case basis.
    revisit_in: never

  - id: DEF-002
    title: "Plugin Check warning baseline (78 warnings)"
    reason: |
      The 78 warnings tracked in `audit/plugin-check-warning-baseline.txt`
      are all either (a) custom-table direct queries that can't be
      avoided in a ledger plugin (`WordPress.DB.DirectDatabaseQuery.*`),
      or (b) prefix-detection false-positives in block render.php files
      (`PrefixAllGlobals.NonPrefixedHooknameFound` for WP-core hooks
      like `the_content`). The `bin/check-plugin-check.sh` gate
      ensures the total can only shrink — that's the right policy. No
      sprint-level action.
    revisit_in: never

  - id: DEF-003
    title: "wppqa enum-consistency cross-domain collisions (4 findings)"
    reason: |
      The wppqa scanner flags `status` / `type` / `event` / `reason` as
      "drifted" because multiple files declare different allowed values.
      All 4 are intentional — different domains share the keyword. The
      plugin's own `bin/check-enum-drift.sh` (domain-scoped, runs every
      CI) is green. No action.
    revisit_in: never

  - id: DEF-004
    title: "wppqa scanner: 18 false-positive 'Block may lack SSR' warnings"
    reason: |
      All 19 blocks have a `render.php` file. Scanner heuristic appears
      to read only block.json `render` field (which is a file path, not
      a callback name) and concludes SSR is missing. Patch the wp-plugin-qa
      MCP server's block-SSR check, not the plugin code.
    revisit_in: never

  - id: DEF-005
    title: "wppqa scanner: 12 gapAnalysis false-positives"
    reason: |
      The omnibus audit reports "no activation hook", "no deactivation
      hook", "no uninstall.php", "no Requires WP/PHP" — all 5 are present
      and correct in wb-gamification.php / uninstall.php. Scanner reads
      the wrong source. Patch the wp-plugin-qa MCP server.
    revisit_in: never

  - id: DEF-006
    title: "Silent empty-state findings (~30 sites)"
    reason: |
      The frontend-eval scanner counts every `if (empty(...)) { return; }`
      block as a "silent empty state" — but most are inside engines /
      CLI / backfillers where silent-return IS the contract (no UI is
      being rendered; an upstream caller decides what to do with the
      empty result). The 4 sites that DO render UI (LeaderboardEngine,
      LeaderboardNudge, NotificationBridge, ProfilePage) are correctly
      guarded — the silent return is the documented "no-rows" path.
    revisit_in: never
