    severity: medium
    category: a11y
    source: wppqa
    title: "Setup wizard welcome notice is not dismissible"
    where:
      - file: src/Admin/SetupWizard.php
        line: 226
    detail: |
      The "Welcome to WB Gamification!" notice rendered by
      `maybe_show_welcome_notice()` uses `notice notice-info wb-gam-notice`
