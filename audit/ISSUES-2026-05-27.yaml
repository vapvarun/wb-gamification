  # -- LOW --------------------------------------------------------------------

  - id: WBG-010
    severity: low
    category: contract_drift
    source: manifest_static_analysis
    title: "Declared cap wb_gam_view_analytics has no Capabilities::user_can() guard"
    where:
      - file: src/Admin/AnalyticsDashboard.php
        line: 62
      - file: src/Engine/Capabilities.php
        line: 70
    detail: |
      `wb_gam_view_analytics` is declared in
      `Capabilities::declared_caps()` and used as the
      `add_submenu_page()` capability arg, but no
      `Capabilities::user_can('wb_gam_view_analytics')` runs inside the
      render path. Admin-menu visibility IS the only gate today. Working
      as intended, but the audit pattern across other pages (badges,
      challenges, webhooks, etc.) layers a handler-level cap check on top
      of the menu gate. If a future direct-URL access path slips in (e.g.
      a quick-link from another plugin), the cap won't enforce.
    suggested_fix: |
      Add `if ( ! Capabilities::user_can( 'wb_gam_view_analytics' ) ) {
      wp_die( esc_html__( 'You are not allowed to view analytics.',
      'wb-gamification' ) ); }` at the top of
      `AnalyticsDashboard::render()` to match the pattern used by
      BadgeAdminPage / ChallengeManagerPage / etc.
    journey_owns_this: []
    blocked_by: []
    refs:
      - manifest_path: "static_analysis.cap_drift.declared_but_unenforced"

  - id: WBG-011
    severity: low
    category: contract_drift
    source: manifest_static_analysis
    title: "uninstall.php references 2 cap names that don't exist in code"
    where:
      - file: uninstall.php
        line: 163
      - file: uninstall.php
        line: 165
    detail: |
      `wb_gam_manage_api_keys` (uninstall.php:165) and
      `wb_gam_manage_redemptions` (uninstall.php:163) are listed in the
      role-cleanup pass but neither is declared in
      `Capabilities::declared_caps()` nor enforced anywhere in code.
      ApiKeysPage uses `manage_options`; RedemptionStorePage uses
      `wb_gam_manage_rewards`. The uninstall pass `revoke()` will silently
      do nothing for these — not harmful, but they're confusing dead
      strings for anyone reading uninstall.php.
    suggested_fix: |
      Two options:
        (a) Delete the two strings from the uninstall caps list. Lowest
            risk — removes the dead reference and keeps the cleanup pass
            focused on caps that actually exist.
        (b) Add `wb_gam_manage_api_keys` and `wb_gam_manage_redemptions`
            to `Capabilities::declared_caps()` and enforce them at
            ApiKeysPage / RedemptionStorePage render entry, replacing
            `manage_options` / `wb_gam_manage_rewards`. Higher risk —
            renaming a live cap mid-release breaks any role-manager
            integrations site owners already configured.
      Option (a) is the right call for v1.4.x; revisit (b) for v1.5 if
      the team wants tighter cap delegation across all admin pages.
    journey_owns_this: []
    blocked_by: []
    refs:
      - manifest_path: "static_analysis.cap_drift.orphan_in_uninstall_only"

