  - id: DEFP-001
    title: "Phase C — scale seed (10k users × 50 events) deliberately SKIPPED"
    reason: |
      The site is in active failure (3.6M AS rows growing). Seeding 10k
      synthetic users would multiply LeaderboardNudge's per-tick fan-out
      by 2000× and likely crash MySQL irrecoverably on this Local box.
      Once PERF-001 is fixed AND the AS backlog is drained, a follow-up
      diagnostic with a clean seed will validate post-fix steady state.
    revisit_in: "after PERF-001 + PERF-002 land"

  - id: DEFP-002
    title: "Phase D — Playwright + SAVEQUERIES per-page query dump SKIPPED"
    reason: |
      Two reasons. (a) The mu-plugin pattern from the parent's runbook
      writes a temp `0-savequeries.php`, which adds load to an already
      starved PHP-FPM pool — adding worker overhead while diagnosing
      a worker-pool exhaustion bug is unsound. (b) REST cold-cache
      timings already measured (94-187 ms range, see PERF-005) confirm
      handler-level work is < 5 ms; the bottleneck isn't query count
      per request, it's the boot path itself.
    revisit_in: "after PERF-001 + PERF-002 land, on a clean Local install"

  - id: DEFP-003
    title: "Phase B5 — Redis object-cache validation SKIPPED (no Redis available)"
    reason: |
      Local dev box has no Redis / Memcached. This is fine for dev
      (the plugin works correctly on Default cache, just without
      cross-request memoization). Documented in PERF-008.
    revisit_in: never  # dev-environment expected behaviour

