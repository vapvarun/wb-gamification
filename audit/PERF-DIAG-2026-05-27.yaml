findings:

  # -- CRITICAL --------------------------------------------------------------

  - id: PERF-001
    severity: critical
    category: queue
    title: "Infinite Action-Scheduler recursion in LeaderboardNudge — 3.5M rows in 40h"
    where:
      - file: src/Engine/LeaderboardNudge.php
        line: 50
      - file: src/Engine/LeaderboardNudge.php
        line: 60
      - file: src/Engine/LeaderboardNudge.php
        line: 234
    detail: |
      LeaderboardNudge reuses the same hook name for two purposes that
      MUST be distinct:

        const CRON_HOOK = 'wb_gam_weekly_nudge';   // line 50
        add_action( self::CRON_HOOK, ::'dispatch_batch' );  // line 60
        do_action( 'wb_gam_weekly_nudge', ... );    // line 234 — public API

      `send_nudge()` (the per-user Action-Scheduler callback) ends by
      firing `do_action('wb_gam_weekly_nudge', ...)` as a documented
      third-party extension point. But that hook name is ALSO the WP-Cron
      hook the engine listens on, wired to `dispatch_batch()`. So every
      completed nudge re-runs the full dispatch — which re-enqueues a new
      nudge for every active user. With 5 active users, each nudge spawns
      ~5 more nudges, in a cascade that only the `as_has_scheduled_action()`
      pending-guard inside dispatch_batch can interrupt — and only when
      ALL pending slots happen to overlap (rare under sustained load).

      Observed rate: 617,973 nudges scheduled in a single hour (2026-05-26
      02:00 UTC). Sustained avg ~150-250 nudges/sec for the last 40 hours.

      Downstream blast radius:
        • wp_actionscheduler_actions:   3,603,461 rows / 2,322 MB and growing
        • wp_actionscheduler_logs:     18,022,600 rows / 2,169 MB and growing
        • PHP-FPM worker pool exhaustion → 538 nginx "Connection refused"
          errors in 18h, 96% of them on as_async_request_queue_runner
        • MySQL pegged 100% CPU during peak runner activity (observed
          mid-diagnostic: PID 22431 at 100% CPU for ~12 minutes)
        • mcp__mcp-local-wp__mysql_query MCP connection itself died and
          could not be re-opened — fallback to direct mysql shell required

      This is the proximate root cause of the user's reported 502s. Local-
      by-Flywheel's PHP container appears to "sleep" only because PHP-FPM
      is starved by AS runners — the container is alive, the workers are
      all consumed processing impossible-to-drain queue work.

    evidence: |
      Queue depth + recursion fingerprint:

        mysql> SELECT hook, COUNT(*) FROM wp_actionscheduler_actions
               GROUP BY hook ORDER BY 2 DESC LIMIT 3;
        +-----------------------------+---------+
        | hook                        | n       |
        +-----------------------------+---------+
        | wb_gam_nudge_single_user    | 3579056 |  -- 99.99% of all complete actions
        | mvs_competitions_tick       |     318 |
        | jetonomy_cleanup_expired    |      38 |
        +-----------------------------+---------+

        SELECT MIN(scheduled_date_gmt), MAX(scheduled_date_gmt), COUNT(*)
        FROM wp_actionscheduler_actions WHERE hook='wb_gam_nudge_single_user';
        2026-05-25 17:36 → 2026-05-27 10:13   3,587,270  (~40 h)

        SELECT args, COUNT(*) FROM wp_actionscheduler_actions
        WHERE hook='wb_gam_nudge_single_user' GROUP BY args ORDER BY 2 DESC;
        [1]  → 1,263,492    -- user 1 nudged ~1.26M times
        [10] → 1,263,480    -- user 10 nudged ~1.26M times
        [4]  →   364,883
        [2]  →   352,498
        [5]  →   342,009

      Recursive enqueue pattern in wp_actionscheduler_logs (most recent 20
      rows, decoded):

        action 6925179 (user [2]): created 10:14:47 → started 10:15:09 →
                                   completed 10:15:09
                          ⮑ created action 6925183 (user [2]) at 10:15:09
            i.e. each completion spawns the next iteration within the same
            second.

      Nginx upstream errors caused by this load:

        $ grep -c 'as_async_request_queue_runner' logs/nginx/error.log
        198
        $ grep -c 'Connection refused' logs/nginx/error.log
        538
        $ wc -l logs/nginx/error.log
        559

      Most-failed nginx URL paths (96% of all 502s are AS workers):
        149 POST /wp-admin/admin-ajax.php?action=as_async_request_queue_runner&nonce=576b9e1353
         49 POST /wp-admin/admin-ajax.php?action=as_async_request_queue_runner&nonce=efd33956fe
         17 POST /wp-admin/admin-ajax.php
          8 GET  /wp-json/mvs/v1/me/messages/unread-count
          5 GET  /wp-json/wb-gamification/v1/members/me/toasts

      Source of recursion (the exact line that triggers it):

        // src/Engine/LeaderboardNudge.php
        50:  const CRON_HOOK      = 'wb_gam_weekly_nudge';
        51:  const AS_SINGLE_HOOK = 'wb_gam_nudge_single_user';
        ...
        60:  add_action( self::CRON_HOOK, array( __CLASS__, 'dispatch_batch' ) );
        ...
        // inside send_nudge() — fires PER-NUDGE:
        234: do_action( 'wb_gam_weekly_nudge', $user_id, $rank, ... );

      grep confirms `wb_gam_weekly_nudge` is referenced in exactly 4 places
      (LeaderboardNudge.php ×3, uninstall.php ×1). The constant name and
      the public API name are the same string. The recursion is structural.

    suggested_fix: |
      Two stacked fixes — both required, ship in the same PR.

      FIX 1: Rename the public API hook so it does NOT collide with the
      cron hook. Pick one:

        (a) Change line 234 to fire a distinct hook:

              do_action( 'wb_gam_weekly_nudge_sent', $user_id, $rank,
                         $points, $points_to_next, $message );

            This is the BC-safe rename — `wb_gam_weekly_nudge` was always
            documented as a third-party extension point, but the docblock
            on line 234 calls it the "post-send" event. Renaming to
            `wb_gam_weekly_nudge_sent` makes the intent obvious and frees
            up `wb_gam_weekly_nudge` for the cron schedule alone.

        (b) OR keep the public name and rename the cron const:

              const CRON_HOOK = 'wb_gam_weekly_nudge_cron';

            But this requires re-scheduling the cron event on upgrade
            (DbUpgrader.php pass) and a deactivate/reactivate dance in
            production. (a) is lower risk.

      FIX 2: Add a recursion guard in send_nudge() — even after the rename,
      a future engineer could re-introduce the bug. Mirror the pattern in
      Engine::process:

        public static function send_nudge( int $user_id ): void {
            static $in_progress = [];
            if ( isset( $in_progress[ $user_id ] ) ) {
                return; // recursion guard
            }
            $in_progress[ $user_id ] = true;
            try {
                // ...existing send logic...
            } finally {
                unset( $in_progress[ $user_id ] );
            }
        }

      DEPLOYMENT STEPS (in this order):

        1. Stop the bleeding: disable the cron + drain the queue:
             wp cron event delete wb_gam_weekly_nudge
             wp action-scheduler action delete --status=pending --hook=wb_gam_nudge_single_user --yes
             wp action-scheduler action delete --status=complete --hook=wb_gam_nudge_single_user --yes
        2. Ship the rename + recursion guard.
        3. Re-schedule the cron via plugin reactivation OR call
           LeaderboardNudge::activate() once via wp shell.
        4. Add a unit test that asserts send_nudge() does NOT cause
           dispatch_batch() to be called (via mock or assertion that
           the AS group remains empty after a single send).
        5. Add a customer journey under audit/journeys/release/ that
           confirms exactly one nudge per user per cron tick.

    journey_owns_this:
      - audit/journeys/release/04-earning-journey.md   # exists; extend
      - audit/journeys/release/leaderboard-nudge.md    # NEW — see fix step 5
    blocked_by: []
    refs:
      - file: src/Engine/LeaderboardNudge.php
      - file: logs/nginx/error.log
      - file: logs/php/error.log
      - data: "wp_actionscheduler_actions (3,603,461 rows, 2,322 MB)"
      - data: "wp_actionscheduler_logs (18,022,600 rows, 2,169 MB)"

  - id: PERF-002
    severity: critical
    category: db
    title: "Action Scheduler tables at 4.5 GB combined — daily cleaner unable to keep up"
    where:
      - file: src/Engine/ActionSchedulerCleaner.php
        line: 65   # private const BATCH_SIZE = 1000
      - file: src/Engine/ActionSchedulerCleaner.php
        line: 72   # private const MAX_RUNTIME_SECONDS = 50
      - file: src/Engine/ActionSchedulerCleaner.php
        line: 60   # const DEFAULT_RETENTION_DAYS = 7
    detail: |
      ActionSchedulerCleaner is engineered for the steady-state — 1000-row
      batches with a 50-second runtime budget can prune ~30-50k rows per
      daily tick under normal load. With 3.6M rows accumulated in 40 hours
      AND still actively growing, the cleaner cannot drain faster than the
      LeaderboardNudge bug enqueues. Even after PERF-001 is fixed, this
      cleaner — at its current settings — needs ~4 months of daily ticks
      to bring the table back to baseline.

      Secondary effect: every AS worker tick reads through the bloated
      `wp_actionscheduler_actions` table. The `claim_id_status_priority_
      scheduled_date_gmt` composite index helps, but at 2.32 GB with 3.6M
      rows the InnoDB buffer-pool churn is non-trivial. This is why MySQL
      pegged 100% CPU mid-diagnostic.

      The cleaner ALSO never actually ran in this site's history — the
      `wb_gam_as_cleanup_last_run` option does not exist, and `wp_cron`
      shows the next firing scheduled at timestamp 1779941333 (future).
      The cron is wired but has never fired because PHP-FPM is starved.

    evidence: |
      Table sizes (information_schema):

        wp_actionscheduler_actions   3,603,461 rows   2,322.78 MB
        wp_actionscheduler_logs     18,022,600 rows   2,169.34 MB
        ──────────────────────────────────────────────────────────
        Combined                                     ~4,492    MB

      Active growth during the audit (between two queries ~5 minutes
      apart): wp_actionscheduler_actions grew from 3,587,270 → 3,603,461
      (a delta of +16,191 rows in ~5 min, or ~3,200 rows/minute).

      Cleaner config (src/Engine/ActionSchedulerCleaner.php):
        BATCH_SIZE          = 1000
        MAX_RUNTIME_SECONDS = 50
        DEFAULT_RETENTION_DAYS = 7

      Cleaner has never run:
        SELECT * FROM wp_options
         WHERE option_name='wb_gam_as_cleanup_last_run';
        Empty set.

      Old rows that the cleaner would touch (>7 days):
        SELECT COUNT(*) FROM wp_actionscheduler_actions
         WHERE status='complete' AND scheduled_date_gmt < NOW() - INTERVAL 7 DAY;
        0  -- everything is too recent, so even a working cleaner does nothing
            here. The cleaner's design assumes a slow drip, not a flood.

    suggested_fix: |
      Three-part remediation:

      PART 1 (one-shot, manual): drain the AS bloat once PERF-001 is fixed.
      WP-CLI is safer than raw SQL because it cascades to the logs table:

        wp action-scheduler action delete --status=complete \
          --hook=wb_gam_nudge_single_user --yes
        wp action-scheduler action delete --status=pending \
          --hook=wb_gam_nudge_single_user --yes

      For raw speed on a runaway like this, drop straight to MySQL with
      foreign-key-aware batched DELETEs (the AS table has no FK to logs,
      so the logs cleanup is by action_id):

        DELETE l FROM wp_actionscheduler_logs l
          INNER JOIN wp_actionscheduler_actions a ON l.action_id = a.action_id
          WHERE a.hook = 'wb_gam_nudge_single_user' LIMIT 50000;  -- loop
        DELETE FROM wp_actionscheduler_actions
          WHERE hook = 'wb_gam_nudge_single_user' LIMIT 50000;    -- loop

      Then OPTIMIZE TABLE wp_actionscheduler_actions; (will block reads
      briefly — schedule for a maintenance window).

      PART 2 (code change): make the cleaner self-throttle when the table
      is over a high-water mark. Add to ActionSchedulerCleaner::cleanup():

        $row_count = (int) $wpdb->get_var(
          "SELECT COUNT(*) FROM {$wpdb->prefix}actionscheduler_actions"
        );
        if ( $row_count > 100000 ) {
          // Emergency mode: ignore retention, prune oldest first, larger
          // batch + longer runtime budget until we're under 100k.
          self::emergency_prune();
        }

      With an emergency_prune() that uses BATCH_SIZE=5000 and runs until
      the table is < 100k rows OR runtime > 5 minutes (whichever comes
      first), re-arming on the next tick.

      PART 3 (monitoring): record `wb_gam_as_cleanup_last_run`,
      `wb_gam_as_cleanup_last_count`, `wb_gam_as_cleanup_emergency_mode`
      so the admin Analytics page can surface a warning when the cleaner
      hasn't fired in >2 days or when emergency mode is engaged.

    evidence_followups:
      - "After draining, expected disk reclaim: ~4.4 GB local; on prod sites this is the difference between an unbacked-up Local install fitting on a laptop and not"
    blocked_by:
      - PERF-001  # no point draining if the bug refills the queue
    refs:
      - file: src/Engine/ActionSchedulerCleaner.php
      - data: "information_schema.TABLES — wp_actionscheduler_actions size"

  # -- HIGH ------------------------------------------------------------------

  - id: PERF-003
    severity: high
    category: network
    title: "PHP-FPM worker pool exhausted by as_async_request_queue_runner"
    where:
      - file: logs/nginx/error.log
    detail: |
      Direct consequence of PERF-001. nginx logged 538 "Connection refused"
      errors against the PHP-FPM socket over an 18-hour window. 96% of the
      failed requests are POSTs to admin-ajax.php?action=as_async_request_
      queue_runner — Action Scheduler's async runner endpoint. The pattern
      is: each AS action that completes immediately enqueues another, which
      kicks the runner, which holds a PHP-FPM worker for the duration of
      send_nudge(). With 5 active users firing in lockstep, all available
      FPM workers can be consumed inside ~1-2 seconds, and every other
      request (admin pages, REST endpoints, even wp-cron) gets refused.

      The user observed this as: "site goes 502 / times out". Local-by-
      Flywheel's PHP container is alive; it has no free workers to accept
      the connection.

    evidence: |
      Worst hour distribution (errors per hour on 2026-05-26 / -27):
        2026/05/26 22:   24
        2026/05/26 23:   69
        2026/05/27 00:   52
        2026/05/27 01:   60
        2026/05/27 08:   48
        2026/05/27 09:   75
        2026/05/27 10:   89   <- peak
        2026/05/27 11:   78
        2026/05/27 12:   32

      Failed URL distribution (top 5):
        149  POST /wp-admin/admin-ajax.php?action=as_async_request_queue_runner&nonce=576b9e1353
         49  POST /wp-admin/admin-ajax.php?action=as_async_request_queue_runner&nonce=efd33956fe
         17  POST /wp-admin/admin-ajax.php
          8  GET  /wp-json/mvs/v1/me/messages/unread-count
          5  GET  /wp-json/wb-gamification/v1/members/me/toasts

      Two distinct AS runner nonces visible — runner re-arms with a fresh
      nonce each scheduling tick, confirming the cascading enqueue pattern.

    suggested_fix: |
      Fixed automatically once PERF-001 lands and PERF-002 part 1 drains
      the backlog. No standalone code change required — this is a symptom,
      not a separate bug. Mentioning it explicitly because:

        (a) the user asked "why does the site 502" and this is the answer
            they see in nginx logs
        (b) if PERF-001 ever recurs in a subtler form, this is the symptom
            that surfaces first — worth monitoring.

      Optional: add a HEALTH check to the Doctor CLI:

        wp wb-gamification doctor — flag if as_async_request_queue_runner
        is in top 3 admin-ajax actions by frequency.

    blocked_by:
      - PERF-001
    refs:
      - file: logs/nginx/error.log

  - id: PERF-004
    severity: high
    category: db
    title: "wb_gam_user_badges duplicate-key INSERT loop (75 errors / 18h)"
    where:
      - file: src/Engine/BadgeEngine.php
        line: 197   # award_badge() entry
      - file: src/Engine/BadgeEngine.php
        line: 246   # $wpdb->insert
    detail: |
      `BadgeEngine::award_badge( $user_id, $badge_id )` checks
      `self::has_badge()` at line 198 then INSERTs at line 246. Between
      those two statements there's no row-lock — and with the user-level
      async award path (AsyncEvaluator hook), two parallel workers can
      reach line 246 with the same $user_id+$badge_id pair, hit the
      `user_badge` UNIQUE index, and bail out with `wpdb_err:
      "duplicate key"`. PHP-FPM error.log shows 75 instances in 18h,
      all for `user_id=7, badge_id=first_post`.

      This is a logic race, not just a noisy log line — the duplicate
      INSERT is correctly rejected by MySQL (so no double-credit), but
      the error path returns `false` and the caller may treat that as
      "award failed" — there's no distinction between "INSERT raced
      against a duplicate" and "INSERT failed for an unrelated reason".
      A future caller that retries on `false` could enter a tight retry
      loop. PointsEngine::debit has a related symptom — 38 errors in
      the same window — though the message there ("mocked error") looks
      like a leftover test-env artefact.

    evidence: |
      logs/php/error.log tail (15 distinct timestamps):

        [27-May-2026 02:30:04 UTC] [wb_gam] ERROR BadgeEngine: failed to
         insert wb_gam_user_badges row. {"user_id":7,"badge_id":
         "first_post","wpdb_err":"duplicate key"}
        [27-May-2026 02:31:17 UTC] [wb_gam] ERROR BadgeEngine: failed to
         insert wb_gam_user_badges row. (same payload)
        [27-May-2026 02:32:53 UTC] (same)
        ...
        [27-May-2026 09:57:29 UTC] (same)

      Total instances: 75 (BadgeEngine duplicate-key), 38 (PointsEngine
      ledger debit "mocked error").

      Schema confirms the UNIQUE constraint:
        SHOW INDEX FROM wp_wb_gam_user_badges;
        + Key_name   = user_badge
        + Non_unique = 0   (UNIQUE)
        + Columns    = user_id, badge_id

    suggested_fix: |
      Two layers:

      (a) Make the INSERT idempotent. Replace `$wpdb->insert(...)` with
          a single INSERT ... ON DUPLICATE KEY UPDATE, OR use INSERT
          IGNORE and inspect rows_affected to detect the "already had it"
          case:

            $sql = $wpdb->prepare(
              "INSERT IGNORE INTO {$wpdb->prefix}wb_gam_user_badges
                 (user_id, badge_id, earned_at, expires_at)
               VALUES (%d, %s, %s, %s)",
              $user_id, $badge_id, current_time('mysql'), $expires_at
            );
            $rows = $wpdb->query( $sql );
            if ( $rows === 0 ) {
              return false;   // already had it — silent no-op, NOT an error
            }
            if ( $rows === false ) {
              Log::error( 'BadgeEngine insert failed', [...] );
              return false;
            }

          This eliminates the race AND removes the noisy log line.

      (b) Add a unit test that fires two simultaneous award_badge() calls
          and asserts exactly one INSERT lands. Use the existing PHPUnit
          test harness — `tests/Unit/Engine/BadgeEngineTest.php` is the
          home.

      For PointsEngine::debit `"mocked error"` (38 instances): grep for
      'mocked error' across src/ — this looks like a test fixture leaking
      into the dev install. Confirm and document before shipping.

    journey_owns_this:
      - audit/journeys/release/04-earning-journey.md
    blocked_by: []
    refs:
      - file: src/Engine/BadgeEngine.php
      - file: logs/php/error.log

  - id: PERF-005
    severity: high
    category: boot
    title: "WP-CLI boot wall-time is 1.57s median — plugin's boot path is heavy"
    where:
      - file: wb-gamification.php
      - file: src/Engine/Engine.php
    detail: |
      Three back-to-back `wp eval 'echo "ok";'` runs measured:
        run 1:   2.27 s
        run 2:   1.56 s
        run 3:   1.57 s   (median)

      The first run includes opcache priming; the steady-state of 1.57 s
      is what an admin page or REST hit pays before WordPress even
      reaches its dispatcher. For comparison, a "clean" WP install with
      no plugins should boot WP-CLI in ~300-500 ms. The 1+ second
      overhead is divided across the plugin's 12 engine boots
      (PointsEngine, BadgeEngine, ChallengeEngine, StreakEngine,
      CommunityChallengeEngine, RankAutomation, CredentialExpiryEngine,
      WeeklyEmailEngine, LeaderboardNudge, NudgeEngine,
      TransactionalEmailEngine, etc.), plus ManifestLoader::scan() at
      priority 5 (full src/ tree walk) and 8 other plugins active on
      this dev box (Jetonomy, Jetonomy Pro, WPMediaVerse, WPMediaVerse
      Pro, BuddyPress, WooCommerce, LearnDash, FakerPress).

      The plugin's own contribution is hard to isolate without a
      profiler (Xdebug or Tideways MCP). Suggest a follow-up profile
      with WP_DEBUG-style microbench instrumentation at the hook entry
      points (plugins_loaded@8, init@10, init@20) — already planned in
      the `0-perf-diag.php` mu-plugin pattern in the parent's runbook
      but skipped here to avoid further side effects on the unstable
      site.

    evidence: |
      /usr/bin/time -p wp eval 'echo "ok";'
        run 1: real 2.27 / user 1.43 / sys 0.27
        run 2: real 1.56 / user 1.36 / sys 0.17
        run 3: real 1.57 / user 1.37 / sys 0.17

      REST cold-cache latencies (5 runs each, warm):
        /members/me/toasts:               94 - 187 ms
        /leaderboard?period=week&limit=10: 94 - 98 ms
        /leaderboard?period=all&limit=100: 95 - 99 ms
        /badges:                          92 - 96 ms
        /badges?user_id=1:                97 - 112 ms
        /members/1/streak?heatmap_days=365: 95 - 99 ms
        /members/1/events?per_page=100:   96 - 98 ms
        /leaderboard/me:                  94 - 99 ms

      REST endpoints themselves are uniformly ~95 ms — most of which is
      the WordPress + plugin boot. The endpoint handlers add < 5 ms on
      top. So the boot path IS the hot path. Caching the rendered REST
      response wouldn't help much; the only lever is the boot itself.

    suggested_fix: |
      Defer this — it's the next biggest win once PERF-001/002 are out
      of the way, but the dev site is unstable enough that we shouldn't
      add an instrumentation mu-plugin right now. Plan:

        1. Install a clean WP + wb-gamification (no other plugins) Local
           site to baseline this plugin's boot cost in isolation.
        2. Add the `0-perf-diag.php` mu-plugin pattern and capture
           per-hook timings: plugins_loaded@0/1/5/6/8/10/12/15/20.
        3. The big-win candidates are:
             - ManifestLoader::scan() — does it cache its scan result?
             - Per-engine init() that does DB queries on every request
               (NudgeEngine, FeatureFlags) — should read from object cache
             - Block::Registrar walks build/Blocks/*/block.json every
               init@20 — should be transient-cached

      Acceptable steady-state target: < 600 ms WP-CLI boot on this same
      multi-plugin install.

    blocked_by:
      - PERF-001  # site needs to be stable first
    refs:
      - file: wb-gamification.php
      - file: src/Engine/Engine.php
      - file: src/Engine/ManifestLoader.php
      - file: src/Engine/FeatureFlags.php

  # -- MEDIUM ----------------------------------------------------------------

  - id: PERF-006
    severity: medium
    category: log
    title: "8,830 'translation loading too early' notices from wpmediaverse-pro pollute debug.log"
    where:
      - file: wp-content/debug.log
      - file: wp-content/plugins/wpmediaverse-pro/wpmediaverse-pro.php
    detail: |
      debug.log has 8,830 entries (88% of the file) for
      `_load_textdomain_just_in_time` against the `wpmediaverse-pro`
      text-domain. This is NOT a wb-gamification bug — wpmediaverse-pro
      is a sibling plugin on the same dev box that's calling __() or
      esc_html__() before the `init` action. But the noise drowns real
      wb-gamification errors and makes log analysis painful (this audit
      spent a non-trivial chunk of time grepping it out).

    evidence: |
      Top distinct debug.log entries (truncated, by occurrence):
        8830 PHP Notice:  Function _load_textdomain_just_in_time was called incorrectly. Translation loading for the wpmediaverse-pro domain ...
         860 PHP Deprecated: Function bp_core_get_user_domain is deprecated since version 12 ...
         106 PHP Deprecated: Using null as an array offset is deprecated ...
          12 PHP Fatal error: Uncaught TypeError: WBGam\Engine\LeaderboardEngine::get_leaderboard ... HeartbeatChannel.php on line 290
                                                                                                          ^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^
                                                                                  ALREADY FIXED in commit 132ac9e (engine integrity wave)
           6 PHP Deprecated: strip_tags(): Passing null as $string ...

    suggested_fix: |
      Out of scope for wb-gamification — fix in wpmediaverse-pro by
      moving its __() / esc_html__() calls under an `init` hook. File
      a separate ticket against the wpmediaverse-pro plugin.

      For wb-gamification: nothing to do, but flag this in the runbook
      so future diagnostics don't waste time on it.

    journey_owns_this: []
    blocked_by: []
    refs:
      - file: wp-content/debug.log

  - id: PERF-007
    severity: medium
    category: queue
    title: "ActionSchedulerCleaner retention is 7 days but the bug accumulates in hours"
    where:
      - file: src/Engine/ActionSchedulerCleaner.php
        line: 60   # const DEFAULT_RETENTION_DAYS = 7
    detail: |
      The 7-day retention is fine for a healthy site — keeps enough
      debug history to investigate yesterday's failure without bloating
      the table. But it offers no defence against a runaway bug that
      generates 3.5M rows in 40 hours: every one of those rows is < 7
      days old and the cleaner cannot touch them. The cleaner needs a
      row-count-based throttle in addition to the date-based retention.

    evidence: |
      const DEFAULT_RETENTION_DAYS = 7;  # src/Engine/ActionSchedulerCleaner.php:60

      mysql> SELECT MIN(scheduled_date_gmt) FROM wp_actionscheduler_actions
             WHERE status='complete' AND scheduled_date_gmt < DATE_SUB(NOW(), INTERVAL 7 DAY);
      NULL  -- ZERO rows are older than 7 days. Cleaner does nothing.

      Even at BATCH_SIZE=1000 and MAX_RUNTIME_SECONDS=50, the cleaner
      can prune at most ~30-50k rows per daily tick — far below the
      ~150k/hour growth rate during PERF-001 peaks.

    suggested_fix: |
      Implemented as part of PERF-002's emergency_prune() proposal —
      same fix closes both. The two findings are kept separate so we
      can track the steady-state vs emergency behaviour distinctly in
      monitoring.

    blocked_by:
      - PERF-002
    refs:
      - file: src/Engine/ActionSchedulerCleaner.php

  - id: PERF-008
    severity: medium
    category: cache
    title: "No persistent object cache on dev — production has one, audit can't measure"
    where:
      - file: wp-content/object-cache.php  # absent
    detail: |
      `wp cache type` reports `Default` — the dev site has no persistent
      object cache (no Redis / Memcached drop-in at wp-content/
      object-cache.php). This is fine for a single-user dev install, but
      means every cache-aware code path in this plugin (PointsEngine::
      get_total, PointTypeService::list, LeaderboardEngine::get_leaderboard,
      every WP_Object_Cache group read) goes through the per-request
      MemoryCache only — i.e. cache effectively MISSES on every fresh
      page load.

      CLAUDE.md is explicit that persistent cache is REQUIRED for >10k
      user sites. The plugin code does the right thing — calls
      wp_cache_get / wp_cache_set throughout. We just can't validate
      cache-hit behaviour on this dev box, and we shouldn't extrapolate
      timings from here to production.

    evidence: |
      $ wp cache type
      Default

      $ ls wp-content/object-cache.php
      ls: No such file or directory

    suggested_fix: |
      No code change — dev environment limitation, expected.

      Document explicitly in audit/STABILITY-2026-05-27.md that the
      perf numbers in this report are from a NO-CACHE configuration and
      will not match production. Add `wp cache type` check to the
      `wp wb-gamification doctor` CLI so production deployments can
      self-verify the persistent-cache requirement.

    journey_owns_this: []
    blocked_by: []
    refs:
      - file: CLAUDE.md  # "Production hosting requirements" section

  # -- LOW -------------------------------------------------------------------

  - id: PERF-009
    severity: low
    category: db
    title: "MySQL slow_query_log is OFF — can't measure prod-shape slow queries"
    where:
      - file: "/Users/varundubey/Library/Application Support/Local/run/3IdPu79Q1/conf/mysql/my.cnf"
    detail: |
      Local-by-Flywheel ships MySQL with slow_query_log=OFF by default.
      slow_query_log_file IS configured (Varuns-MacBook-Pro-slow.log)
      but the log itself is disabled, so any future slow-query
      investigation will need to enable it first.

    evidence: |
      mysql> SHOW VARIABLES LIKE 'slow_query_log%';
        slow_query_log       OFF
        slow_query_log_file  /Users/varundubey/Library/Application Support/Local/run/3IdPu79Q1/mysql/data/Varuns-MacBook-Pro-slow.log

    suggested_fix: |
      For future diagnostics, enable temporarily via:
        SET GLOBAL slow_query_log = 'ON';
        SET GLOBAL long_query_time = 0.1;   -- 100ms threshold
      Then reproduce the workload and read the log. Reset to OFF when
      done — slow log adds disk I/O per query.

      Not a plugin issue, just a dev-env note.

    journey_owns_this: []
    blocked_by: []
    refs:
      - data: "SHOW VARIABLES LIKE 'slow_query_log%'"

