name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpstan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, mbstring

      - name: Install Composer dependencies
        env:
          COMPOSER_NO_INTERACTION: '1'
        run: composer install --no-progress --prefer-dist

      - name: Run PHPStan Level 5
        run: vendor/bin/phpstan analyse -c phpstan.neon.dist --memory-limit=2G

  php-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3', '8.4']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: PHP Lint all source files
        run: find src/ -name "*.php" -exec php -l {} \; && php -l wb-gamification.php
